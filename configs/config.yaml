paths:
  raw_data: data/raw/
  processed_data: data/processed/
  demo_points: data/demo/sample_points.geojson
  demo_chla: data/demo/sample_chla.csv
  outputs: outputs/

sentinel:
  bands:
    - B01
    - B02
    - B03
    - B04
    - B05
    - B06
    - B07
    - B08
    - B08A
    - B10
    - B11
    - B12
  resolution: 20
  patch_size: 5

model:
  test_split: 0.2
  random_seed: 42
  epochs: 50
  batch_size: 16
  learning_rate: 0.001
